openapi: 3.0.3
info:
  title: Go API Kit
  description: Reusable Go REST API starter template documentation.
  version: 2.0.0
  contact:
    name: Go API Kit
    email: team@your-domain.com

servers:
  - url: http://localhost:8080/v1
    description: Local Development Server
  - url: https://api.your-domain.com/v1
    description: Production Server

paths:
  /health:
    get:
      summary: Health Check Endpoint
      description: Checks the status of the server and database connectivity.
      tags:
        - Health
      responses:
        "200":
          description: The server is running normally.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BaseResponse"

  /auth/otp/send:
    post:
      summary: Send OTP Code
      description: Sends an OTP code to the user's phone number via SMS.
      tags:
        - Auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - phone_number
              properties:
                phone_number:
                  type: string
                  example: "+905551112233"
      responses:
        "200":
          description: OTP sent successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BaseResponse"
        "400":
          description: Invalid phone number.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  schemas:
    BaseResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        message:
          type: string
          example: "Operation successful"
        data:
          type: object
          nullable: true

    ErrorResponse:
      type: object
      properties:
        success:
          type: boolean
          example: false
        error:
          type: object
          properties:
            code:
              type: string
              example: "INVALID_INPUT"
            message:
              type: string
              example: "Invalid request parameter"
