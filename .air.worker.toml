# Air configuration for fast live reload (cmd/worker)
root = "."
testdata_dir = "testdata"
tmp_dir = "tmp"

[build]
  args_bin = []
  bin = "./tmp/worker.exe"
  cmd = "go build -o ./tmp/worker.exe ./cmd/worker"
  delay = 300
  exclude_dir = ["tmp", "vendor", "migrations", "queries", ".git", ".idea", ".vscode", "scripts"]
  exclude_file = []
  exclude_regex = ["_test\\.go$"]
  exclude_unchanged = true
  follow_symlink = false
  full_bin = "./tmp/worker.exe"
  include_dir = []
  include_ext = ["go", "yaml", "yml", "json", "env"]
  include_file = []
  kill_delay = "500ms"
  log = "build-errors.log"
  poll = false
  poll_interval = 0
  post_cmd = []
  pre_cmd = []
  rerun = false
  rerun_delay = 500
  send_interrupt = true
  stop_on_error = true

[color]
  app = ""
  build = "yellow"
  main = "magenta"
  watcher = "cyan"

[log]
  main_only = false
  time = true

[misc]
  clean_on_exit = true

[screen]
  clear_on_rebuild = true
  keep_scroll = true
