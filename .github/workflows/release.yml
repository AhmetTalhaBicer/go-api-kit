name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  release:
    name: Build & Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: "go.mod"
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Run tests
        run: go test -v ./...

      - name: Build binaries (linux/amd64 and linux/arm64)
        run: |
          VERSION=${GITHUB_REF_NAME}
          mkdir -p dist

          GOOS=linux GOARCH=amd64 CGO_ENABLED=0 \
            go build -ldflags="-s -w -X main.Version=${VERSION}" \
            -o dist/server-linux-amd64 ./cmd/api/...

          GOOS=linux GOARCH=arm64 CGO_ENABLED=0 \
            go build -ldflags="-s -w -X main.Version=${VERSION}" \
            -o dist/server-linux-arm64 ./cmd/api/...

          GOOS=darwin GOARCH=amd64 CGO_ENABLED=0 \
            go build -ldflags="-s -w -X main.Version=${VERSION}" \
            -o dist/server-darwin-amd64 ./cmd/api/...

          GOOS=windows GOARCH=amd64 CGO_ENABLED=0 \
            go build -ldflags="-s -w -X main.Version=${VERSION}" \
            -o dist/server-windows-amd64.exe ./cmd/api/...

      - name: Build & push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: deployments/Dockerfile
          push: false  # Set to true and add registry credentials to enable push
          tags: |
            ghcr.io/${{ github.repository }}:${{ github.ref_name }}
            ghcr.io/${{ github.repository }}:latest

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
